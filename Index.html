                        if (last) last.classList.remove('typing');
                        return;
                    }

                    const line = lines[index];
                    line.classList.add('visible');

                    // add typing cursor to this line (remove from previous)
                    if (index > 0) {
                        const prev = lines[index - 1];
                        if (prev) prev.classList.remove('typing');
                    }
                    line.classList.add('typing');

                    index++;
                }

                // reveal first line immediately
                revealNext();

                // then reveal each subsequent line with a delay
                letterTimer = setInterval(() => {
                    revealNext();
                }, 350);
            }

            // --- Render Secret ---
            function renderSecret() {
                const container = document.getElementById('secretContainer');
                const isUnlocked = state.allVisited;
                const secret = CONFIG.secret;

                let drawerHtml = `
                    <div class="secret-drawer ${isUnlocked ? 'unlocked' : 'locked'}">
                        <div class="drawer-handle"></div>
                        <span class="drawer-icon">${isUnlocked ? '🗄️' : '🔒'}</span>
                        <div class="drawer-label">${isUnlocked ? 'Laci terbuka' : 'Laci terkunci'}</div>
                        <div class="drawer-status">${isUnlocked ? '✓ telah dibuka' : 'jelajahi semua menu untuk membuka'}</div>
                    </div>
                `;

                let revealHtml = '';
                if (isUnlocked && secret) {
                    const sType = secret.type || 'text';
                    const sContent = secret.content || 'Tidak ada isi.';
                    let mediaHtml = '';
                    if (sType === 'image') {
                        mediaHtml =
                            `<div class="secret-media"><img src="${assetPath(sContent)}" alt="Rahasia" loading="lazy" /></div>`;
                    } else if (sType === 'video') {
                        mediaHtml =
                            `<div class="secret-media"><video src="${assetPath(sContent)}" controls preload="metadata"></video></div>`;
                    } else {
                        mediaHtml = `<div class="secret-text">${sContent}</div>`;
                    }
                    revealHtml = `
                        <div class="secret-reveal visible">
                            ${mediaHtml}
                        </div>
                    `;
                } else {
                    revealHtml = `
                        <div class="secret-reveal">
                            <div class="secret-text" style="color:var(--color-text-muted);font-size:0.8rem;">
                                🌙 <br />Kunjungi semua bagian terlebih dahulu.
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = drawerHtml + revealHtml;

                // if unlocked, mark state
                if (isUnlocked) {
                    state.secretUnlocked = true;
                }
            }

            // --- Open Media Modal ---
            function openMediaModal(type, file, caption) {
                const filePath = assetPath(file);
                let mediaHtml = '';
                if (type === 'video') {
                    mediaHtml = `<video src="${filePath}" controls autoplay preload="metadata"></video>`;
                } else {
                    mediaHtml = `<img src="${filePath}" alt="${caption || 'Kenangan'}" loading="lazy" />`;
                }

                modalMedia.innerHTML = mediaHtml;
                modalCaption.textContent = caption || '';

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';

                // if video, auto-play
                const video = modalMedia.querySelector('video');
                if (video) {
                    video.play().catch(() => {});
                }
            }

            // --- Close Media Modal ---
            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                // pause any video
                const video = modalMedia.querySelector('video');
                if (video) {
                    video.pause();
                }
                modalMedia.innerHTML = '';
                modalCaption.textContent = '';
            }

            // --- modal close events ---
            modalClose.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                    // also close view if open? no, let user use back button
                }
            });

            // --- Keyboard shortcut: Escape to close view ---
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && currentView) {
                    closeView(currentView);
                }
            });

            // --- Initialize ---
            function init() {
                renderDesk();

                // pre-render all views for faster switching (but keep hidden)
                renderMemories();
                renderTimeline();
                renderMusic();
                renderLetter();
                renderSecret();

                // Ensure desk is visible
                deskView.classList.remove('hidden');
                deskView.style.opacity = '1';
                deskView.style.transform = 'scale(1)';

                console.log('📦 Memoir initialized.');
                console.log('📁 Media files should be placed in the "attach/" folder.');
                console.log('✏️  Edit CONFIG at the top of the script to customize content.');
            }

            // --- Handle resize for responsive adjustments ---
            window.addEventListener('resize', function() {
                // nothing special needed
            });

            // --- Start ---
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
